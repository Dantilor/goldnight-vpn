services:
  postgres:
    image: postgres:16
    container_name: goldnight-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goldnight_vpn
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d goldnight_vpn"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - goldnight_pg_data:/var/lib/postgresql/data

volumes:
  goldnight_pg_data:
